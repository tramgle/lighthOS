set timeout=0
set default=0

menuentry "LighthOS (test)" {
    multiboot /boot/lighthos.bin autorun=/bin/runtests
    module /boot/runtests    /bin/runtests
    module /boot/test_pid    /bin/test_pid
    module /boot/test_fork   /bin/test_fork
    module /boot/test_fs     /bin/test_fs
    module /boot/test_stream /bin/test_stream
    boot
}
