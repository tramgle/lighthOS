set timeout=0
set default=0

menuentry "LighthOS (test)" {
    multiboot /boot/lighthos.bin autorun=/bin/runtests

    module /boot/runtests    /bin/runtests
    module /boot/shell       /bin/shell
    module /boot/assert      /bin/assert
    module /boot/hello       /bin/hello
    module /boot/echo        /bin/echo
    module /boot/cat         /bin/cat
    module /boot/wc          /bin/wc
    module /boot/head        /bin/head
    module /boot/tail        /bin/tail
    module /boot/grep        /bin/grep
    module /boot/cp          /bin/cp
    module /boot/mv          /bin/mv
    module /boot/touch       /bin/touch
    module /boot/ls          /bin/ls
    module /boot/sleep       /bin/sleep
    module /boot/mkdir       /bin/mkdir
    module /boot/mount       /bin/mount
    module /boot/umount      /bin/umount
    module /boot/chroot      /bin/chroot
    module /boot/mmaptest    /bin/mmaptest
    module /boot/env         /bin/env
    module /boot/envtest     /bin/envtest
    module /boot/sigtest     /bin/sigtest
    module /boot/alarmtest   /bin/alarmtest
    module /boot/strace      /bin/strace

    module /boot/test_pid    /bin/test_pid
    module /boot/test_fork   /bin/test_fork
    module /boot/test_fs     /bin/test_fs
    module /boot/test_stream /bin/test_stream

    module /boot/tests/head_tail.vsh  /tests/head_tail.vsh
    module /boot/tests/cp_mv.vsh      /tests/cp_mv.vsh
    module /boot/tests/grep.vsh       /tests/grep.vsh
    module /boot/tests/cat_fat.vsh    /tests/cat_fat.vsh
    module /boot/tests/pipes.vsh      /tests/pipes.vsh
    module /boot/tests/signal.vsh     /tests/signal.vsh
    module /boot/tests/jobs.vsh       /tests/jobs.vsh
    module /boot/tests/mount.vsh      /tests/mount.vsh
    module /boot/tests/alarm.vsh      /tests/alarm.vsh
    module /boot/tests/strace.vsh     /tests/strace.vsh
    module /boot/tests/mmap_anon.vsh  /tests/mmap_anon.vsh
    module /boot/tests/chroot.vsh     /tests/chroot.vsh
    module /boot/tests/lua_basic.vsh  /tests/lua_basic.vsh
    module /boot/tests/dynhello.vsh   /tests/dynhello.vsh
    module /boot/tests/dyn_echo.vsh   /tests/dyn_echo.vsh
    module /boot/tests/ldso_smoke.vsh /tests/ldso_smoke.vsh
    module /boot/tests/env.vsh        /tests/env.vsh
    module /boot/tests/dlopen.vsh     /tests/dlopen.vsh

    boot
}
